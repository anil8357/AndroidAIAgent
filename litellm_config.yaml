general_settings:
  master_key: sk-litellm-master-key
  # IMPORTANT: keep this FALSE so THIS YAML is the single source of truth for models,
  # routing order, and fallbacks. With it `true`, LiteLLM can serve models stored in the
  # Postgres DB (e.g. anything ever added via the Admin UI), which SHADOWS this file — the
  # classic cause of "my fallbacks / model reorder aren't taking effect" (every call kept
  # hitting the old primary). Prompt/response logging below does NOT need this to be true.
  store_model_in_db: false
  # Prompt/response content is still persisted to spend logs so the dashboard
  # "Request & Response" panel renders payloads (uses DATABASE_URL directly).
  store_prompts_in_spend_logs: true

# ============================================================
# Android OpenCode Agent — LiteLLM Proxy Config
# 100% free-tier models • No credit card required
#
# 6 providers, independent rate-limit pools:
#   NVIDIA NIM (build.nvidia.com — free first-party) | Gemini (direct) | OpenRouter
#   | Groq (LPU) | Cerebras (wafer-scale) | NaraRouter
#
# Model strategy (NVIDIA NIM primary — free first-party, generous limits):
#   coder     → NIM GLM-5.2 → NIM DeepSeek V4 Pro → Claude Sonnet 4.5
#               → Owl Alpha → Mistral Large → Laguna M.1 → Groq Llama 4 Scout → Nex-N2 → Cerebras → Gemini Flash
#   planner   → NIM Nemotron 3 Super → NIM GLM-5.2 → Claude Sonnet 4.5 → OR Nemotron Super/Ultra
#   reasoner  → NIM Nemotron 3 Super → NIM DeepSeek V4 Pro → OR Nemotron Super → Claude Sonnet 4.5
#               → Owl Alpha → Mistral Large → Groq/Cerebras gpt-oss → Nemotron Ultra
#   reviewer  → NIM Mistral Medium 3.5 → NIM Llama-3.3-Nemotron-Super-49B → Claude Haiku 4.5
#               → Owl Alpha → Mistral Medium → Qwen3-235B → Groq → Nemotron Ultra → Cerebras → Gemini Flash
#
# Keys needed: NVIDIA_NIM_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY, GROQ_API_KEY, CEREBRAS_API_KEY, NARA_API_KEY
#
# NVIDIA NIM models use LiteLLM's `nvidia_nim/<publisher>/<model>` prefix (base URL
# https://integrate.api.nvidia.com/v1, resolved by LiteLLM). If a chosen model shows as
# unavailable, open its page on build.nvidia.com → API Reference and copy the exact
# `model=` slug; the router simply skips a 404 deployment and falls through.
# ============================================================

model_list:

  # ── CODER MODEL ─────────────────────────────────────────────
  # Best coding models, quality-optimized order
  # NVIDIA NIM first — free first-party with generous limits.
  # Claude Sonnet 4.5, Owl Alpha, Mistral Large next — quality fallbacks.
  # Gemini Flash last resort (20 RPD daily cap, burns through quickly).

  # PRIMARY: NVIDIA NIM (free first-party, generous limits). glm-5.2 = flagship agentic-
  # coding model; deepseek-v4-pro = 1M-ctx coding MoE. Verify slugs on each model's API
  # Reference tab if one 404s (the router just skips a bad deployment and falls through).
  - model_name: coder
    litellm_params:
      model: nvidia_nim/z-ai/glm-5.2
      api_key: os.environ/NVIDIA_NIM_API_KEY
      num_retries: 2
    model_info:
      rpm: 40
      tpm: 200000

  - model_name: coder
    litellm_params:
      model: nvidia_nim/deepseek-ai/deepseek-v4-pro
      api_key: os.environ/NVIDIA_NIM_API_KEY
      num_retries: 2
    model_info:
      rpm: 40
      tpm: 200000

  # Fallbacks: Claude (quality), Owl Alpha, Mistral Large, Laguna behind NIM.
  # Gemini demoted to last-resort tier (low RPD cap).
  - model_name: coder
    litellm_params:
      model: openai/claude-sonnet-4.5
      api_base: https://router.bynara.id/v1
      api_key: os.environ/NARA_API_KEY
      num_retries: 2
    model_info:
      rpm: 10
      tpm: 200000

  - model_name: coder
    litellm_params:
      model: openrouter/openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY
      num_retries: 2
    model_info:
