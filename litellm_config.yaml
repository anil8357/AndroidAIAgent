# ── ROUTER SETTINGS ─────────────────────────────────────────
router_settings:
  # simple-shuffle tries each deployment in order, falling through on failure.
  # usage-based-routing-v2 was putting all deployments into cooldown from
  # cascading 429s; simple-shuffle just moves to the next one immediately.
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 5
  timeout: 300
  allowed_fails: 1
  # Once a deployment fails once, cool it down for 120s so the router skips it.
  # This is critical for rate-limited providers (e.g. Gemini's 20 RPD daily cap) —
  # once exhausted, they must stay out of rotation for a meaningful period.
  cooldown_time: 120
  # Ensure 429s trigger fallback across deployments within the same model group
  retry_policy:
    RateLimitError: 3
    # BadRequestError (HTTP 400) means the request is malformed or the model doesn't
    # support the input. Retrying NEVER succeeds — it only wastes attempts and delays
    # the fallback. Set to 0 so LiteLLM moves to the next deployment immediately.
    BadRequestError: 0
    ContentPolicyViolationError: 0
  # Cross-group fallbacks (only if ALL deployments in a group are exhausted):
  fallbacks:
    - coder: ["reasoner", "reviewer"]
    - reasoner: ["planner", "coder", "reviewer"]
    - planner: ["reasoner", "coder"]
    - reviewer: ["reasoner", "coder"]
  context_window_fallbacks:
    - coder: ["reasoner"]
    - reasoner: ["planner", "coder"]
    - planner: ["reasoner"]
    - reviewer: ["reasoner"]

# ── LITELLM SETTINGS ────────────────────────────────────────
litellm_settings:
  json_logs: true
  drop_params: true
  # Strip `reasoning_content`/`thinking_blocks` from assistant messages before every call.
  # drop_params does NOT sanitize nested message fields, so Groq/Cerebras otherwise reject
  # replayed reasoning-model history with: "property 'reasoning_content' is unsupported".
  # Implemented in strip_reasoning.py (mounted at /app/strip_reasoning.py by docker-compose).
  callbacks: strip_reasoning.proxy_handler_instance
  request_timeout: 300
  cache: True
  cache_params:
    type: "local"
    supported_call_types:
      - "acompletion"
      - "completion"
  # Ensures the full prompt/response is sent to models without truncation.
  # The context_window_fallbacks in router_settings handles overflow at routing level.
