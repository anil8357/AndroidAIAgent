  # ── PLANNER MODEL ─────────────────────────────────────────────
  # Dedicated model for @planner agent — needs long output + strong reasoning
  # Priority: Claude Sonnet 4.5 (reliable) → Nemotron Super → DeepSeek R1 → Nemotron Ultra → Owl Alpha → Mistral Large
